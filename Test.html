<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loki's Mindgame</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Press Start 2P';
            background: #000000;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            background: #fff;
            padding: 25px;
            border-radius: 25px;
            margin-bottom: 25px;
            box-shadow: 0 8px 0 #106c2b;
            border: 5px solid #fff;
        }

        h1 {
            color: #106c2b;
            font-size: 2.5em;
            margin-bottom: 20px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stat {
            background: white;
            color: #106c2b;
            padding: 12px 25px;
            border-radius: 20px;
            box-shadow: 0 5px 0 black;
            border: 4px solid #fff;
        }

        .stat-label {
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: transparent;
            aspect-ratio: 1;
            cursor: pointer;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s;
        }

        .card:hover {
            transform: scale(1.08);
        }

        .card.flipped {
            transform: rotateY(180deg);
        }

        .card.flipped:hover {
            transform: rotateY(180deg) scale(1.08);
        }

        .card.matched {
            pointer-events: none;
        }

        .card-front,
        .card-back {
            position: absolute;
            width: 100px;
            height: 150px;
            backface-visibility: hidden;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        

        
        .card-front  {
            background: #fff;
            color: #e32ab8;
            font-size: 3.5em;
            box-shadow: 0 6px 0 #106c2b;
            border: 5px solid #000000;
            size: 2px;
            background-image: 'https://cdn.discordapp.com/attachments/1418138384882339881/1446871809088557076/Lokisymbol.jpg?ex=69be0320&is=69bcb1a0&hm=dc0183a39fbbe0bc75072650a1b0771931e1ce4e6805453ce52eb37205b15901';

        }

        .card-back {
            background: #000000;
            transform: rotateY(180deg);
            overflow: hidden;
            box-shadow: 0 6px 0 #106c2b;
            border: 5px solid #000000;
        }

        .card-back img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .controls {
            text-align: center;
        }

        .controls {
            font-family: Press Start 2P;
        }

        .btn {
            background: whitesmoke;
            color: black;
            border: 5px solid #fff;
            padding: 15px 40px;
            border-radius: 20px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 6px 0 #7ab8a8;
            transition: all 0.2s;
            font-family: Press Start 2P;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 9px 0 #7ab8a8;
        }

        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 3px 0 #7ab8a8;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            justify-content: center;
            align-items: center;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 0 #d4a574;
            border: 6px solid #FF6B9D;
            animation: bounce 0.5s;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .modal-content h2 {
            color: #FF6B9D;
            font-size: 2.8em;
            margin-bottom: 20px;
        }

        .modal-content p {
            color: #FFA07A;
            font-size: 1.4em;
            margin-bottom: 30px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
            }
            
            h1 {
                font-size: 2em;
            }
        }

        @media (max-width: 480px) {
            .game-board {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }
            
            h1 {
                font-size: 1.6em;
            }
            
            .card-front {
                font-size: 2.5em;
            }
        }

        a{
  position:absolute;
  bottom: 20px;
  right: 20px;
}
#Back{
  font-family: 'Press Start 2P', sans-serif;
  color: white;
}
#Back:hover{
  color:blue;
  background-color: transparent;
  text-decoration: underline;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1> Loki's Mindgames </h1>
            <div class="stats">
                <div class="stat">
                    <div class="stat-label">Moves</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Time</div>
                    <div class="stat-value" id="time">0:00</div>
                </div>
                <div class="stat">
                    <div class="stat-label">Matches</div>
                    <div class="stat-value" id="matches">0/8</div>
                </div>
            </div>
        </div>

        <div class="game-board" id="gameBoard"></div>

        <div class="controls">
            <button class="btn" onclick="newGame()">
                <i class="fas fa-redo"></i> New Game
            </button>
        </div>
    </div>

    <div class="modal" id="winModal">
        <div class="modal-content">
            <h2> Game Over! </h2>
            <p>Moves: <span id="finalMoves"></span><br>Time: <span id="finalTime"></span></p>
            <p> Click "Back to Navigation" to exit</p>
        </div>
    </div>
    
    <a href="Games.html" id="Back"> Back to navigation</a>
    

 
    


    <script>
        // Image URLs from Unsplash - cute animals and nature
        var Loki = 'https://cdn.discordapp.com/attachments/1418138384882339881/1446871809088557076/Lokisymbol.jpg?ex=69be0320&is=69bcb1a0&hm=dc0183a39fbbe0bc75072650a1b0771931e1ce4e6805453ce52eb37205b15901';
        var images = [
        'https://media.discordapp.net/attachments/1418138384882339881/1446863926401830932/Mjolnir-_Thor_s-Hammer_600x600.webp?ex=69c341c9&is=69c1f049&hm=38999e4afc6e78d01589a31f4def04c7250319895b7d5516179b08a589023850&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446864054944796752/Wolves-_Fenrir_93215a35-8681-4754-978c-fb39f436b90d_480x480.webp?ex=69c341e8&is=69c1f068&hm=d4f2b78c912ef26f67c8780bb0c47f214a53aabdecb8fe389035e659d2908b3d&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446864056412799068/Dragon-_Norse-Serpents_9c527c74-c3f1-4282-8dbe-d51c53d5c84b_600x600.jpg?ex=69c341e8&is=69c1f068&hm=835315e6213bf6dd2c8870683900ba718d9ae9318d2f200193259ae720dcbd99&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446864057226367189/LeggedHorse-_Sleipnir_600x600.webp?ex=69c341e8&is=69c1f068&hm=32c8f177699cc91c214c0cd175693aee59cacadf32a4a4bcaa337a807ad1ed79&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446864057863897360/Gungnir-_Odin_s-Spear_5349a8fe-9b44-4653-9616-f9beae884164_600x600.webp?ex=69c341e8&is=69c1f068&hm=a7b84489cc7997efa0f05cc6dc8820d355166689c1a4fa8eec308847e639206e&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446864058392252466/Viking-Axe-_Norse-Weapon_600x600.webp?ex=69c341e8&is=69c1f068&hm=9774a2cac532bbbe48606229c43561e01474448a1a6aace8cb9fe737aa600841&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446863926804611132/Yggdrasil-_Tree-of-Life_600x600.webp?ex=69c341c9&is=69c1f049&hm=064cc67363c3ecfb975d0dfe8a6a16853f892f91a7c17090c712e55d55b32de4&=&format=webp',
        'https://media.discordapp.net/attachments/1418138384882339881/1446863927303602226/Valknut-_Knot-of-the-Slain_1d44b83f-8abd-44b7-bed3-1130b592ac6d_600x600.webp?ex=69c341c9&is=69c1f049&hm=0c17b26214724523fda5964e1685a7e7af8686e27f2d5c5819436cd89b476d5c&=&format=webp'      
    
          

           
        ];

        var firstCard = null;
        var secondCard = null;
        var canFlip = true;
        var matches = 0;
        var moves = 0;
        var seconds = 0;
        var timerRunning = false;
        var timerInterval;

        // Start the game
        function startGame() {
            var gameBoard = document.getElementById('gameBoard');
            gameBoard.innerHTML = '';
            
            // Create pairs of cards
            var cardImages = images.concat(images);
            
            // Shuffle cards
            cardImages.sort(function() {
                return Math.random() - 0.5;
            });
            
            // Create card elements
            for (var i = 0; i < cardImages.length; i++) {
                var card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = '<div class="card-front"><img src="https://media.discordapp.net/attachments/1418138384882339881/1446871809088557076/Lokisymbol.jpg?ex=69c34920&is=69c1f7a0&hm=6b8fea0a75f5cdaedee25edd6a61b13a5c5d08ed9dabcbc5d18484090fc81a58&=&format=webp" style="width:100px; height:150px; border-radius:20px;"></i> </div>' +
                                '<div class="card-back"><img src="' + cardImages[i] + '"></div>';
                card.onclick = flipCard;
                card.dataset.image = cardImages[i];
                gameBoard.appendChild(card);
            }
            
            // Reset variables
            firstCard = null;
            secondCard = null;
            canFlip = true;
            matches = 0;
            moves = 0;
            seconds = 0;
            timerRunning = false;
            
            updateStats();
            clearInterval(timerInterval);
        }

        function flipCard() {
            if (!canFlip) return;
            if (this.classList.contains('flipped')) return;
            if (this.classList.contains('matched')) return;
            
            // Start timer on first click
            if (!timerRunning) {
                startTimer();
            }
            
            this.classList.add('flipped');
            
            if (firstCard == null) {
                firstCard = this;
            } else {
                secondCard = this;
                canFlip = false;
                moves++;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            var match = firstCard.dataset.image == secondCard.dataset.image;
            
            if (match) {
                setTimeout(function() {
                    firstCard.classList.add('matched');
                    secondCard.classList.add('matched');
                    matches++;
                    updateStats();
                    resetCards();
                    
                    if (matches == 8) {
                        endGame();
                    }
                }, 500);
            } else {
                setTimeout(function() {
                    firstCard.classList.remove('flipped');
                    secondCard.classList.remove('flipped');
                    resetCards();
                }, 1000);
            }
        }

        function resetCards() {
            firstCard = null;
            secondCard = null;
            canFlip = true;
        }

        function startTimer() {
            timerRunning = true;
            timerInterval = setInterval(function() {
                seconds++;
                updateStats();
            }, 1000);
        }

        function updateStats() {
            document.getElementById('moves').textContent = moves;
            document.getElementById('matches').textContent = matches + '/8';
            
            var mins = Math.floor(seconds / 60);
            var secs = seconds % 60;
            if (secs < 10) secs = '0' + secs;
            document.getElementById('time').textContent = mins + ':' + secs;
        }

        function endGame() {
            clearInterval(timerInterval);
            document.getElementById('finalMoves').textContent = moves;
            document.getElementById('finalTime').textContent = document.getElementById('time').textContent;
            document.getElementById('winModal').classList.add('show');
        }

        function newGame() {
            document.getElementById('winModal').classList.remove('show');
            clearInterval(timerInterval);
            startGame();
        }

        // Start the game when page loads
        startGame();
    </script>
</body>
</html>
