<head>

<body class="has-background-light" id="BG" style="background-image: url('Images/Bridge.png');">
  <header>
    <nav>
      <a href="Leaderboards3.1.html">Easy </a>

      <a href="Leaderboards3.3.html">Hard</a>
      <a href="Leaderboards3.4.html">Nightmare</a>
       </nav>
  </header>

  <section class="hero is-leader">
    <div class="hero-body">
      <div class="container">
        <h1 class="title">Odins Rankings (For Thor's Thunder)</h1>
        <h2 class="subtitle">Test your wit against fellow Warriors</h2>
        <h2 class="target">Target: Score is greater than or equal to 95 </h2>
        <br>
        <button onclick=CheckScore(leaderboardData)>Prove thy worthiness</button>
      </div>
    </div>
  </section>


            <p id="boardStatus" class="mt-3"></p>
          </div>
        </div>
        
        <div class="column is-half">
          <div class="box">
            <h3 class="title is-5"></h3>
            <div id="leaderboard" class="leaderboard"></div>
            <p class="is-size-7 mt-3"></p>

            
       
          </div>
          
        </div>
      </div>
    </div>
  </section>

  <script>
    const data = 'local_leaderboard_v1';
    const MAX_ENTRIES = 20;
    const leaderboardData = loadDATA();
    function loadDATA(){
        return JSON.parse(localStorage.getItem("result3")) || [];
    }

    function loadBoard() {
      const raw = localStorage.getItem("result3");
      return raw ? JSON.parse(raw) : [];
    }

    function saveBoard(arr) {
      localStorage.setItem("result3", JSON.stringify(arr));
    }
   
    function renderBoard() {
      const container = document.getElementById('leaderboard');
      const board = loadBoard();
      if (board.length === 0) {
        container.innerHTML = '<div class="notification is-warning">You have not been tested by Thor\'s Thunder, step forward and try</div>';
        return;
      }
      
      board.sort((a, b) => b.score3 - a.score3); // sort descending by moves (higher is better)
      container.innerHTML = '';
      board.forEach((entry, i) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div><strong>${escapeHtml(entry.name)}</strong></div>  <div>${entry.score3}</div>`;
        container.appendChild(div);
        const deleteBtn = document.createElement("button");
                deleteBtn.innerText = "Delete";
                deleteBtn.className = "delete-btn";
                deleteBtn.addEventListener("click", () => {
                    const index = board.indexOf(entry);
                    if (index > -1) {
                        board.splice(index, 1);
                        saveBoard(board);
                        renderBoard();
                    }
                });
                div.appendChild(deleteBtn);
      });
    }
function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }


      // sort ascending by time (lower is better)
      
      renderBoard();
    ;

    function CheckScore(result3){
      let highest = result3[0].score3;

          if(highest>=95){
        alert("You have passed, Brother");
      }
      else{
          alert("You must try again, Brother")
      }
    }

    document.addEventListener('DOMContentLoaded', renderBoard);
    
  </script>

</body>
</html>
