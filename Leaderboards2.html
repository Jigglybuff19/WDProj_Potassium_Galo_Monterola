<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Odin's Knowledge Leaderboard</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel = "icon" type = "image/x-icon" href = "Images/favico.png">
  <link rel="stylesheet" href="style4.css" />
  <style>
    /* leaderboard accent */
    
    .hero .title, .subtitle{ color: blue; }
    .leaderboard .item { display:flex; justify-content:space-between; padding:0.5rem 0; border-bottom:1px solid #eee; }
  </style>
</head>
<body class="has-background-light" id="BG" style="background-image: url('Images/Bridge.png');">

  <section class="hero is-leader">
    <div class="hero-body">
      <div class="container">
        <h1 class="title">Odins Rankings (For Loki's Mindgames)</h1>
        <h2 class="subtitle">Test your wit against fellow Warriors</h2>
        <h2 class="target">Target: Moves are less than 13 </h2>
        <br>
        <button onclick=CheckScore(leaderboardData)>Prove thy worthiness</button>
      </div>
    </div>
  </section>


            <p id="boardStatus" class="mt-3"></p>
          </div>
        </div>

        <div class="column is-half">
          <div class="box">
            <h3 class="title is-5">Top Runs</h3>
            <div id="leaderboard" class="leaderboard"></div>
            <p class="is-size-7 mt-3"></p>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script>
    const data = 'local_leaderboard_v1';
    const MAX_ENTRIES = 20;
    const leaderboardData = loadDATA();
    function loadDATA(){
        return JSON.parse(localStorage.getItem("info")) || [];
    }

    function loadBoard() {
      const raw = localStorage.getItem("info");
      return raw ? JSON.parse(raw) : [];
    }

    function saveBoard(arr) {
      localStorage.setItem("info", JSON.stringify(arr));
    }

    function renderBoard() {
      const container = document.getElementById('leaderboard');
      const board = loadBoard();
      if (board.length === 0) {
        container.innerHTML = '<div class="notification is-warning">You have not been tested by Loki\'s Mindgames, step forward and try</div>';
        return;
      }

      board.sort((a, b) => a.moves - b.moves); // sort ascending by moves (lower is better)
      container.innerHTML = '';
      board.forEach((entry, i) => {
        const div = document.createElement('div');
        div.className = 'item';
        div.innerHTML = `<div><strong>${escapeHtml(entry.name)}</strong></div> <div>${entry.moves.toLocaleString("en-US")}</div>`;
        container.appendChild(div);

        const deleteBtn = document.createElement("button");
                deleteBtn.innerText = "Delete";
                deleteBtn.className = "delete-btn";
                deleteBtn.addEventListener("click", () => {
                    const index = board.indexOf(entry);
                    if (index > -1) {
                        board.splice(index, 1);
                        saveBoard(board);
                        renderBoard();
                    }
                });
                div.appendChild(deleteBtn);
      });
    }
function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    }


      // sort ascending by time (lower is better)
      
      renderBoard();
    ;

    function CheckScore(data){
    
    let lowest = data[0].moves;

          if(lowest<=13){
        alert("You have passed, Brother");
      }
      else{
          alert("You must try again, Brother")
      }
        }

    document.addEventListener('DOMContentLoaded', renderBoard);
  </script>
   <a href="Games.html" id="Back"> Back to navigation </a>
</body>
</html>
